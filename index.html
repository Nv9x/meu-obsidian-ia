<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zettelkasten AI Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --bg: #161618; --sidebar: #1e1e20; --text: #d4d4d4; --accent: #7b97aa; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        #main { flex: 1; display: flex; flex-direction: column; }
        .tab { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .active { display: flex !important; flex-direction: column; }
        textarea { flex: 1; background: transparent; color: white; border: none; outline: none; font-size: 1.2rem; resize: none; margin-top: 20px; }
        #ai-chat { position: fixed; bottom: 20px; right: 20px; width: 300px; background: #252525; border: 1px solid var(--accent); border-radius: 10px; padding: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 1000; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px; cursor: pointer; border-radius: 5px; margin: 5px 0; }
        .btn:hover { opacity: 0.8; }
        input { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; }
        .note-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .note-item:hover { background: #2a2a2c; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>📂 Notas</h3>
    <button class="btn" onclick="createNewNote()">+ Nova Nota</button>
    <div id="note-list"></div>
    <hr style="width:100%; border: 0.5px solid #333; margin: 20px 0;">
    <button class="btn" onclick="showTab('editor')">📝 Editor</button>
    <button class="btn" onclick="showTab('canvas')">🎨 Canvas</button>
    <button class="btn" onclick="showTab('tasks')">✅ Tarefas</button>
</div>

<div id="main">
    <div id="editor" class="tab active">
        <h1 id="note-title" contenteditable="true" onblur="updateNote()">Início</h1>
        <textarea id="note-body" oninput="updateNote()" placeholder="Escreva suas ideias aqui... Use [[Link]] para conectar."></textarea>
    </div>

    <div id="canvas" class="tab">
        <h2>Quadro Branco</h2>
        <div>
            <button class="btn" onclick="addBox()">+ Bloco</button>
            <button class="btn" onclick="canvas.clear()">Limpar</button>
        </div>
        <canvas id="c" width="800" height="500" style="border: 1px solid #444; background: white; border-radius: 8px;"></canvas>
    </div>

    <div id="tasks" class="tab">
        <h2>Tarefas Diárias</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="tIn" style="flex: 1;" placeholder="O que precisa ser feito?"> 
            <button class="btn" onclick="addTask()">Adicionar</button>
        </div>
        <ul id="tList" style="list-style: none; padding: 0; margin-top: 20px;"></ul>
    </div>
</div>

<div id="ai-chat">
    <small>🤖 Assistente Gemini</small>
    <div id="ai-response" style="font-size: 0.85rem; margin: 10px 0; max-height: 200px; overflow-y: auto; color: #bbb;">Olá! Como posso ajudar com suas notas hoje?</div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="ai-input" style="flex: 1;" placeholder="Pergunte à IA...">
        <button class="btn" onclick="askAI()">Ir</button>
    </div>
</div>

<script>
    // --- SUAS CHAVES CONFIGURADAS ---
    const S_URL = 'https://rujblbhnmhilolzhtifz.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1amJsYmhubWhpbG9semh0aWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTYxOTMsImV4cCI6MjA4ODc3MjE5M30.SUf5-rfsgEJAPmfQYkoO8kMknMnBjlt3kWTUaWJ-Hs0';
    const GEMINI_KEY = 'AIzaSyByk5iNAGNXyN_99dKFm7EB7T15BonR_DA';

    // Inicializa o Supabase corretamente
    const meuSupa = supabase.createClient(S_URL, S_KEY);
    
    let currentId = null;
    let canvas;
    let todasNotas = [];

    // Carrega as notas do banco de dados
    async function loadNotes() {
        const { data, error } = await meuSupa.from('notas').select('*');
        if (error) return console.error(error);
        
        todasNotas = data;
        const list = document.getElementById('note-list');
        list.innerHTML = '';
        
        data.forEach(n => {
            const div = document.createElement('div');
            div.className = 'note-item';
            div.innerText = `- ${n.titulo}`;
            div.onclick = () => openNote(n);
            list.appendChild(div);
        });
    }

    function openNote(n) {
        currentId = n.id;
        document.getElementById('note-title').innerText = n.titulo;
        document.getElementById('note-body').value = n.conteudo;
        showTab('editor');
    }

    async function createNewNote() {
        const { data, error } = await meuSupa.from('notas').insert([{ titulo: 'Nova Nota', conteudo: '' }]).select();
        if (error) return alert("Erro ao criar nota");
        loadNotes(); 
        openNote(data[0]);
    }

    async function updateNote() {
        if(!currentId) return;
        const t = document.getElementById('note-title').innerText;
        const c = document.getElementById('note-body').value;
        await meuSupa.from('notas').update({ titulo: t, conteudo: c }).eq('id', currentId);
        // Atualiza a lista lateral para refletir a mudança de título
        setTimeout(loadNotes, 1000); 
    }

    function showTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'canvas' && !canvas) {
            canvas = new fabric.Canvas('c');
        }
    }

    function addBox() { 
        if(!canvas) return;
        canvas.add(new fabric.Rect({ left: 100, top: 100, fill: '#7b97aa', width: 100, height: 60 })); 
    }

    function addTask() {
        const val = document.getElementById('tIn').value;
        if(!val) return;
        document.getElementById('tList').innerHTML += `<li style="margin-bottom:8px;"><input type="checkbox"> ${val}</li>`;
        document.getElementById('tIn').value = '';
    }

    // Integração com IA Gemini
    async function askAI() {
        const promptInput = document.getElementById('ai-input');
        const prompt = promptInput.value;
        const respDiv = document.getElementById('ai-response');
        
        if(!prompt) return;
        
        respDiv.innerText = "Pensando...";
        promptInput.value = '';
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const json = await response.json();
            const textoIA = json.candidates[0].content.parts[0].text;
            respDiv.innerText = textoIA;
        } catch (e) {
            respDiv.innerText = "Erro ao falar com a IA. Verifique sua chave.";
        }
    }

    // Inicia o app carregando as notas
    loadNotes();
</script>
</body>
</html>
