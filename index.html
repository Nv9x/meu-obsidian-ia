<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Cérebro Digital</title>
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root { --bg: #161618; --sidebar: #1e1e20; --text: #d4d4d4; --accent: #7b97aa; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Barra Lateral */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .nav-btn { background: #2a2a2c; color: white; border: 1px solid #444; padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 5px; text-align: left; }
        .nav-btn:hover { background: var(--accent); }
        
        /* Lista de Notas */
        #note-list { flex: 1; overflow-y: auto; margin-top: 15px; border-top: 1px solid #333; }
        .note-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .note-item:hover { color: var(--accent); }

        /* Área Principal */
        #main { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .view { display: none; flex: 1; }
        .active { display: flex !important; flex-direction: column; }

        input#title-input { background: transparent; border: none; color: white; font-size: 2rem; font-weight: bold; outline: none; margin-bottom: 10px; }
        textarea#editor { flex: 1; background: transparent; border: none; color: #ccc; font-size: 1.1rem; resize: none; outline: none; line-height: 1.6; }

        /* Brain Map */
        #brain-map { width: 100%; height: 100%; background: #111; border-radius: 8px; }

        /* Chat IA */
        #ai-box { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #222; border: 1px solid var(--accent); padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #ai-out { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent)">🧠 Brain</h2>
    <button class="nav-btn" style="background:var(--accent); font-weight:bold" onclick="novaNota()">+ Nova Nota</button>
    
    <div id="note-list">Carregando...</div>

    <div style="margin-top: auto;">
        <button class="nav-btn" style="width:100%" onclick="irPara('view-editor')">📝 Editor</button>
        <button class="nav-btn" style="width:100%" onclick="irPara('view-brain')">🌐 Brain (Mapa)</button>
    </div>
</div>

<div id="main">
    <!-- Tela do Editor -->
    <div id="view-editor" class="view active">
        <input type="text" id="title-input" placeholder="Título da nota" onblur="salvar()">
        <textarea id="editor" placeholder="Comece a escrever... use [[Link]] para conectar." oninput="salvar()"></textarea>
    </div>

    <!-- Tela do Mapa (Brain) -->
    <div id="view-brain" class="view">
        <div style="display:flex; justify-content:space-between">
            <h2>Mapa do Cérebro</h2>
            <button class="nav-btn" onclick="gerarMapa()">🔄 Atualizar Mapa</button>
        </div>
        <div id="brain-map"></div>
    </div>
</div>

<div id="ai-box">
    <div id="ai-out">Como posso te ajudar hoje?</div>
    <input type="text" id="ai-in" style="width:70%; background:#111; color:white; border:1px solid #444; padding:5px" placeholder="Pergunte...">
    <button onclick="perguntarIA()" style="background:var(--accent); border:none; color:white; padding:5px; cursor:pointer">Ir</button>
</div>

<script>
    // CHAVES
    const S_URL = 'https://rujblbhnmhilolzhtifz.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1amJsYmhubWhpbG9semh0aWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTYxOTMsImV4cCI6MjA4ODc3MjE5M30.SUf5-rfsgEJAPmfQYkoO8kMknMnBjlt3kWTUaWJ-Hs0';
    const G_KEY = 'AIzaSyByk5iNAGNXyN_99dKFm7EB7T15BonR_DA';

    const supabaseClient = supabase.createClient(S_URL, S_KEY);
    let idAtual = null;
    let notasLocais = [];

    // 1. Alternar entre Editor e Mapa
    function irPara(idDaView) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(idDaView).classList.add('active');
        if(idDaView === 'view-brain') gerarMapa();
    }

    // 2. Carregar Lista de Notas
    async function carregarNotas() {
        const { data } = await supabaseClient.from('notas').select('*').order('id', { ascending: false });
        notasLocais = data || [];
        const lista = document.getElementById('note-list');
        lista.innerHTML = '';
        notasLocais.forEach(n => {
            const item = document.createElement('div');
            item.className = 'note-item';
            item.innerText = n.titulo || 'Nota sem título';
            item.onclick = () => abrirNota(n);
            lista.appendChild(item);
        });
    }

    // 3. Abrir uma Nota
    function abrirNota(n) {
        idAtual = n.id;
        document.getElementById('title-input').value = n.titulo;
        document.getElementById('editor').value = n.conteudo;
        irPara('view-editor');
    }

    // 4. Criar Nova Nota
    async function novaNota() {
        const { data } = await supabaseClient.from('notas').insert([{ titulo: 'Nova Nota', conteudo: '' }]).select();
        if(data) {
            await carregarNotas();
            abrirNota(data[0]);
        }
    }

    // 5. Salvar (sem travar)
    async function salvar() {
        if(!idAtual) return;
        const t = document.getElementById('title-input').value;
        const c = document.getElementById('editor').value;
        await supabaseClient.from('notas').update({ titulo: t, conteudo: c }).eq('id', idAtual);
        // Atualiza a lista lateral em 2 segundos para não dar lag
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(carregarNotas, 2000);
    }

    // 6. Gerar Mapa Mental (Brain)
    function gerarMapa() {
        if(notasLocais.length === 0) return;
        const nodes = notasLocais.map(n => ({ id: n.titulo, label: n.titulo, color: '#7b97aa', font: {color:'#fff'} }));
        const edges = [];
        notasLocais.forEach(n => {
            const links = n.conteudo.match(/\[\[(.*?)\]\]/g);
            if(links) {
                links.forEach(l => {
                    const destino = l.replace('[[','').replace(']]','');
                    if(notasLocais.some(nota => nota.titulo === destino)) {
                        edges.push({ from: n.titulo, to: destino });
                    }
                });
            }
        });
        new vis.Network(document.getElementById('brain-map'), { nodes, edges }, { physics: true });
    }

    // 7. IA
    async function perguntarIA() {
        const input = document.getElementById('ai-in');
        const out = document.getElementById('ai-out');
        const contexto = document.getElementById('editor').value;
        if(!input.value) return;
        out.innerText = "Pensando...";
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Nota atual: ${contexto}. Pergunta: ${input.value}` }] }] })
            });
            const json = await resp.json();
            out.innerText = json.candidates[0].content.parts[0].text;
            input.value = '';
        } catch(e) { out.innerText = "Erro na IA."; }
    }

    // Iniciar
    carregarNotas();
</script>

</body>
</html>
