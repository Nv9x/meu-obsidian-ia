<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Brain - Autocomplete Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root { --bg: #161618; --sidebar: #1e1e20; --text: #d4d4d4; --accent: #7b97aa; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; z-index: 10; }
        .nav-btn { background: #2a2a2c; color: white; border: 1px solid #444; padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 5px; text-align: left; }
        .nav-btn:hover { background: var(--accent); }
        
        #note-list { flex: 1; overflow-y: auto; margin-top: 15px; border-top: 1px solid #333; }
        .note-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .note-item:hover { color: var(--accent); }

        #main { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; overflow: hidden; }
        .view { display: none; flex: 1; height: 100%; }
        .active { display: flex !important; flex-direction: column; }

        input#title-input { background: transparent; border: none; color: white; font-size: 2rem; font-weight: bold; outline: none; margin-bottom: 10px; }
        textarea#editor { flex: 1; background: transparent; border: none; color: #ccc; font-size: 1.1rem; resize: none; outline: none; line-height: 1.6; }

        /* Estilo do Autocomplete */
        #autocomplete-list {
            position: absolute;
            background: #2a2a2c;
            border: 1px solid var(--accent);
            border-radius: 5px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .suggestion-item:hover { background: var(--accent); color: white; }

        #brain-map { width: 100%; height: 90%; background: #111; border-radius: 8px; }
        #ai-box { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #222; border: 1px solid var(--accent); padding: 10px; border-radius: 8px; z-index: 100; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); margin:0 0 10px 0;">🧠 Brain</h2>
    <button class="nav-btn" style="background:var(--accent); font-weight:bold" onclick="novaNota()">+ Nova Nota</button>
    <div id="note-list">Carregando...</div>
    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px;">
        <button class="nav-btn" onclick="irPara('view-editor')">📝 Editor</button>
        <button class="nav-btn" onclick="irPara('view-brain')">🌐 Brain (Mapa)</button>
        <button class="nav-btn" onclick="irPara('view-tasks')">✅ Tarefas</button>
    </div>
</div>

<div id="main">
    <div id="view-editor" class="view active">
        <input type="text" id="title-input" placeholder="Título da nota" onblur="salvar()">
        
        <!-- EDITOR COM AUTOCOMPLETE -->
        <div style="position: relative; flex: 1; display: flex; flex-direction: column;">
            <textarea id="editor" placeholder="Use [[ para conectar notas..." oninput="handleInput(event)"></textarea>
            <div id="autocomplete-list"></div>
        </div>
    </div>

    <div id="view-brain" class="view">
        <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
            <h2 style="margin:0">Mapa Mental</h2>
            <button class="nav-btn" onclick="gerarMapa()">🔄 Atualizar</button>
        </div>
        <div id="brain-map"></div>
    </div>

    <div id="view-tasks" class="view">
        <h2>Minha Rotina</h2>
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <input type="text" id="task-in" style="flex:1; background:#2a2a2c; border:1px solid #444; color:white; padding:10px; border-radius:5px;" placeholder="O que fazer hoje?">
            <button class="nav-btn" onclick="addTarefa()">Add</button>
        </div>
        <div id="task-list-container"></div>
    </div>
</div>

<div id="ai-box">
    <div id="ai-out" style="font-size: 0.8rem; color: #aaa; margin-bottom: 8px; max-height: 100px; overflow-y: auto;">Como posso ajudar?</div>
    <div style="display:flex; gap:5px">
        <input type="text" id="ai-in" style="flex:1; background:#111; color:white; border:1px solid #444; padding:5px" placeholder="IA...">
        <button onclick="perguntarIA()" style="background:var(--accent); border:none; color:white; padding:5px; cursor:pointer; border-radius:3px;">Ir</button>
    </div>
</div>

<script>
    const S_URL = 'https://rujblbhnmhilolzhtifz.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1amJsYmhubWhpbG9semh0aWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTYxOTMsImV4cCI6MjA4ODc3MjE5M30.SUf5-rfsgEJAPmfQYkoO8kMknMnBjlt3kWTUaWJ-Hs0';
    const G_KEY = 'AIzaSyByk5iNAGNXyN_99dKFm7EB7T15BonR_DA';

    const supabaseClient = supabase.createClient(S_URL, S_KEY);
    let idAtual = null;
    let notasLocais = [];

    function irPara(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if(viewId === 'view-brain') gerarMapa();
    }

    async function carregarNotas() {
        const { data } = await supabaseClient.from('notas').select('*').order('id', { ascending: false });
        notasLocais = data || [];
        const lista = document.getElementById('note-list');
        lista.innerHTML = '';
        notasLocais.forEach(n => {
            const item = document.createElement('div');
            item.className = 'note-item';
            item.innerText = n.titulo || 'Sem título';
            item.onclick = () => abrirNota(n);
            lista.appendChild(item);
        });
    }

    function abrirNota(n) {
        idAtual = n.id;
        document.getElementById('title-input').value = n.titulo;
        document.getElementById('editor').value = n.conteudo;
        irPara('view-editor');
    }

    async function novaNota() {
        const { data } = await supabaseClient.from('notas').insert([{ titulo: 'Nova Nota', conteudo: '' }]).select();
        if(data) { await carregarNotas(); abrirNota(data[0]); }
    }

    async function salvar() {
        if(!idAtual) return;
        const t = document.getElementById('title-input').value;
        const c = document.getElementById('editor').value;
        await supabaseClient.from('notas').update({ titulo: t, conteudo: c }).eq('id', idAtual);
        clearTimeout(window.tOut);
        window.tOut = setTimeout(carregarNotas, 2000);
    }

    // --- LÓGICA DE AUTOCOMPLETE ---
    function handleInput(e) {
        salvar();
        const el = e.target;
        const val = el.value;
        const pos = el.selectionStart;
        const textBefore = val.substring(0, pos);
        const match = textBefore.match(/\[\[([^\]]*)$/);

        if (match) {
            const query = match[1].toLowerCase();
            const suggestions = notasLocais.filter(n => n.titulo.toLowerCase().includes(query));
            showSuggestions(suggestions, pos);
        } else {
            document.getElementById('autocomplete-list').style.display = 'none';
        }
    }

    function showSuggestions(list, pos) {
        const div = document.getElementById('autocomplete-list');
        if (list.length === 0) { div.style.display = 'none'; return; }

        div.innerHTML = '';
        list.forEach(n => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.innerText = n.titulo;
            item.onclick = () => completarLink(n.titulo);
            div.appendChild(item);
        });
        div.style.display = 'block';
        div.style.top = '40px'; // Fica no topo do editor para não atrapalhar o texto
        div.style.left = '10px';
    }

    function completarLink(titulo) {
        const el = document.getElementById('editor');
        const val = el.value;
        const pos = el.selectionStart;
        const textBefore = val.substring(0, pos).replace(/\[\[[^\[]*$/, '[[' + titulo + ']]');
        const textAfter = val.substring(pos);
        el.value = textBefore + textAfter;
        document.getElementById('autocomplete-list').style.display = 'none';
        salvar();
        el.focus();
    }

    // --- BRAIN MAP ---
    function gerarMapa() {
        const nodes = notasLocais.map(n => ({ id: n.titulo, label: n.titulo, color: '#7b97aa', font: {color:'#fff'} }));
        const edges = [];
        notasLocais.forEach(n => {
            const links = n.conteudo.match(/\[\[(.*?)\]\]/g);
            if(links) {
                links.forEach(l => {
                    const dest = l.replace('[[','').replace(']]','');
                    if(notasLocais.some(x => x.titulo === dest)) edges.push({ from: n.titulo, to: dest, color: '#444' });
                });
            }
        });
        new vis.Network(document.getElementById('brain-map'), { nodes, edges }, { physics: { enabled: true, barnesHut: { gravitationalConstant: -2000 } } });
    }

    function addTarefa() {
        const txt = document.getElementById('task-in').value;
        if(!txt) return;
        const div = document.createElement('div');
        div.style = "background:#252527; padding:10px; margin-bottom:5px; border-radius:5px;";
        div.innerHTML = `<input type="checkbox"> <span>${txt}</span>`;
        document.getElementById('task-list-container').appendChild(div);
        document.getElementById('task-in').value = '';
    }

    async function perguntarIA() {
        const input = document.getElementById('ai-in');
        const out = document.getElementById('ai-out');
        if(!input.value) return;
        out.innerText = "Pensando...";
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Nota atual: ${document.getElementById('editor').value}. Pergunta: ${input.value}` }] }] })
            });
            const json = await resp.json();
            out.innerText = json.candidates[0].content.parts[0].text;
            input.value = '';
        } catch(e) { out.innerText = "Erro na IA."; }
    }

    carregarNotas();
</script>
</body>
</html>
