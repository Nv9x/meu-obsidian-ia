<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zettelkasten AI - My Brain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root { --bg: #161618; --sidebar: #1e1e20; --text: #d4d4d4; --accent: #7b97aa; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar corrigida para nunca ficar bloqueada */
        #sidebar { 
            width: 250px; 
            background: var(--sidebar); 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            z-index: 100; /* Garante que os botões fiquem no topo */
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }

        #main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        .tab { display: none; flex: 1; padding: 20px; overflow-y: auto; height: 100%; }
        .active { display: flex !important; flex-direction: column; }
        
        textarea { flex: 1; background: transparent; color: white; border: none; outline: none; font-size: 1.1rem; resize: none; margin-top: 15px; line-height: 1.6; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; margin: 5px 0; font-weight: bold; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        
        .note-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .note-item:hover { background: #2a2a2c; }

        #brain-container { flex: 1; width: 100%; height: 500px; background: #000; border-radius: 8px; margin-top: 10px; }

        #ai-chat { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #252525; border: 1px solid var(--accent); border-radius: 10px; padding: 10px; z-index: 200; }
        input { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--accent); margin-bottom: 20px;">🧠 Brain</h2>
    <button class="btn" onclick="createNewNote()">+ Nova Nota</button>
    <div id="note-list" style="flex: 1; overflow-y: auto; margin: 10px 0;"></div>
    <hr style="border: 0.5px solid #333; width: 100%;">
    <button class="btn" onclick="showTab('editor')">📝 Editor</button>
    <button class="btn" onclick="showTab('brain')">🌐 Brain Map</button>
    <button class="btn" onclick="showTab('canvas')">🎨 Canvas</button>
    <button class="btn" onclick="showTab('tasks')">✅ Tarefas</button>
</div>

<div id="main">
    <!-- Editor -->
    <div id="editor" class="tab active">
        <h1 id="note-title" contenteditable="true" onblur="updateNote()" style="margin:0">Início</h1>
        <textarea id="note-body" oninput="updateNote()" placeholder="Use [[Link]] para conectar notas..."></textarea>
    </div>

    <!-- Brain Map -->
    <div id="brain" class="tab">
        <h2>Mapa de Conexões</h2>
        <div id="brain-container"></div>
    </div>

    <!-- Outras abas simplificadas para estabilidade -->
    <div id="canvas" class="tab">
        <h2>Canvas</h2>
        <canvas id="c" width="800" height="500" style="border: 1px solid #444; background: white;"></canvas>
    </div>

    <div id="tasks" class="tab">
        <h2>Tarefas</h2>
        <input type="text" id="tIn" placeholder="Nova tarefa..."> <button onclick="addTask()" class="btn">Add</button>
        <ul id="tList"></ul>
    </div>
</div>

<div id="ai-chat">
    <small>🤖 IA Gemini</small>
    <div id="ai-response" style="font-size: 0.8rem; margin: 10px 0; max-height: 100px; overflow-y: auto;">Como posso ajudar?</div>
    <input type="text" id="ai-input" style="width: 70%;" placeholder="Pergunte...">
    <button onclick="askAI()" class="btn" style="padding: 5px;">Ir</button>
</div>

    async function loadNotes() {
        try {
            const { data } = await meuSupa.from('notas').select('*');
            if (!data) return;
            todasNotas = data;
            const list = document.getElementById('note-list');
            list.innerHTML = '';
            data.forEach(n => {
                const d = document.createElement('div');
                d.className = 'note-item';
                d.innerText = n.titulo || 'Sem título';
                d.onclick = () => openNote(n);
                list.appendChild(d);
            });
        } catch (e) { console.error("Erro ao carregar:", e); }
    }

    function openNote(n) {
        currentId = n.id;
        document.getElementById('note-title').innerText = n.titulo;
        document.getElementById('note-body').value = n.conteudo;
        showTab('editor');
    }

    async function createNewNote() {
        const { data, error } = await meuSupa.from('notas').insert([{ titulo: 'Nova Nota', conteudo: '' }]).select();

            await loadNotes();
            openNote(data[0]);
        }
    }
